name: Coop Wolt Crawl + Ingest
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"   # daily at 04:00 UTC

# ---------------------------------------------------------------------------
# Job 1: crawl — one runner per store, no DB access, 90min timeout
# Job 2: ingest — runs after all crawls succeed, loads each CSV into DB
# Split because crawl alone takes ~70min leaving no headroom for ingest.
# ---------------------------------------------------------------------------

jobs:

  # -------------------------------------------------------------------------
  # CRAWL: scrape each Wolt store, write CSV, upload as artifact
  # -------------------------------------------------------------------------
  crawl:
    name: crawl (${{ matrix.store_host }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - store_id: "551"
            city: "parnu"
            store_host: "coop-prnu"
          - store_id: "552"
            city: "tallinn"
            store_host: "coop-laagri"
          - store_id: "553"
            city: "tallinn"
            store_host: "konsum-juri"
          - store_id: "554"
            city: "tallinn"
            store_host: "coop-miiduranna"
          - store_id: "555"
            city: "tallinn"
            store_host: "coop-akadeemia"
          - store_id: "556"
            city: "tallinn"
            store_host: "coop-lasname"
          - store_id: "557"
            city: "tallinn"
            store_host: "coop-mustakivi"
          - store_id: "558"
            city: "tallinn"
            store_host: "konsum-saku"
    env:
      PYTHONUNBUFFERED: "1"
      STORE_ID: ${{ matrix.store_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests selectolax tenacity

      - name: Crawl Wolt store (CSV only, no DB)
        run: |
          python3 scripts/wolt_crawler.py \
            --store-host "${{ matrix.store_host }}" \
            --city "${{ matrix.city }}" \
            --categories-file "data/wolt_categories_slugs.txt" \
            --skip-ingest

      - name: Show CSV output
        run: |
          ls -lah out/ || true
          for f in out/coop_wolt_*.csv; do
            echo "--- $f ---"
            wc -l "$f" || true
            head -n 3 "$f" || true
          done

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: wolt-csv-${{ matrix.store_host }}-${{ github.run_id }}
          path: out/coop_wolt_*.csv
          if-no-files-found: warn
          retention-days: 3

  # -------------------------------------------------------------------------
  # INGEST: download all CSVs and load into DB via batched upserts
  # Runs after ALL crawl jobs finish (including partial failures)
  # FIX: increased timeout-minutes from 180 to 360
  # FIX: replaced row-by-row upsert_product_and_price calls with batched
  #      executemany for dramatically faster ingest
  # -------------------------------------------------------------------------
  ingest:
    name: ingest (all stores)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: crawl
    # Run even if some crawl shards failed — ingest whatever landed
    if: always()
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_PUBLIC }}
      PGSSLMODE: require
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install psycopg

      - name: Download all crawl artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wolt-csv-*-${{ github.run_id }}
          path: out/
          merge-multiple: true

      - name: Show downloaded CSVs
        run: |
          echo "Downloaded files:"
          ls -lah out/ || echo "(none)"

      - name: Ingest all CSVs into DB
        run: |
          python3 - <<'PYEOF'
          import os, csv, glob, psycopg, datetime

          db_url = os.environ["DATABASE_URL"]

          # store_host -> store_id mapping (matches matrix above)
          STORE_MAP = {
              "coop-prnu":       551,
              "coop-laagri":     552,
              "konsum-juri":     553,
              "coop-miiduranna": 554,
              "coop-akadeemia":  555,
              "coop-lasname":    556,
              "coop-mustakivi":  557,
              "konsum-saku":     558,
          }

          # Batched upsert via upsert_product_and_price — same function,
          # but called with executemany in chunks for much faster throughput
          SQL = """
          SELECT upsert_product_and_price(
              %s::text, %s::text, %s::text, %s::text, %s::text,
              %s::text, %s::numeric, %s::text, %s::integer, %s, %s::text
          );
          """

          BATCH_SIZE = 200  # rows per executemany call

          csvs = glob.glob("out/coop_wolt_*.csv")
          if not csvs:
              print("[warn] No CSVs found in out/ — nothing to ingest.")
              raise SystemExit(0)

          total_sent = 0
          total_errors = 0
          ts_now = datetime.datetime.now(datetime.timezone.utc)

          with psycopg.connect(db_url) as conn:
              for csv_path in sorted(csvs):
                  print(f"[ingest] processing {csv_path}")
                  with open(csv_path, newline="", encoding="utf-8") as f:
                      reader = csv.DictReader(f)
                      rows = list(reader)

                  if not rows:
                      print(f"  -> empty, skipping")
                      continue

                  # Derive store_host from store_host column in CSV
                  sample_host = (rows[0].get("store_host") or "").replace("wolt:", "").strip()
                  if sample_host not in STORE_MAP:
                      for key in STORE_MAP:
                          if key in csv_path:
                              sample_host = key
                              break

                  store_id = STORE_MAP.get(sample_host)
                  if not store_id:
                      print(f"  -> [warn] unknown store_host '{sample_host}', skipping")
                      continue

                  # Build param list, skipping invalid rows
                  params = []
                  for r in rows:
                      price_raw = r.get("price") or ""
                      try:
                          price_val = float(price_raw)
                      except (ValueError, TypeError):
                          continue
                      if price_val <= 0:
                          continue

                      ext_id = f"wolt:{r.get('item_id') or ''}" if r.get("item_id") else ""
                      if not ext_id or ext_id == "wolt:":
                          continue

                      params.append((
                          "wolt",
                          ext_id,
                          r.get("name") or "",
                          "",
                          r.get("unit_info") or "",
                          r.get("barcode_gtin") or "",
                          price_val,
                          "EUR",
                          store_id,
                          ts_now,
                          "",
                      ))

                  # Execute in batches
                  sent = 0
                  errors = 0
                  for i in range(0, len(params), BATCH_SIZE):
                      batch = params[i:i + BATCH_SIZE]
                      try:
                          with conn.cursor() as cur:
                              cur.executemany(SQL, batch)
                          conn.commit()
                          sent += len(batch)
                      except Exception as e:
                          conn.rollback()
                          errors += len(batch)
                          print(f"  [warn] batch {i//BATCH_SIZE} failed: {e}")
                          # Fall back to row-by-row for this batch to salvage good rows
                          with conn.cursor() as cur:
                              for p in batch:
                                  try:
                                      cur.execute(SQL, p)
                                      sent += 1
                                      errors -= 1
                                  except Exception as e2:
                                      if errors <= 3:
                                          print(f"  [warn] row failed {p[1]}: {e2}")
                                      conn.rollback()
                          conn.commit()

                  print(f"  -> store_id={store_id} ({sample_host}): {sent} upserted, {errors} errors")
                  total_sent += sent
                  total_errors += errors

          print(f"\n[done] Total: {total_sent} rows upserted, {total_errors} errors")
          PYEOF

      - name: Verify prices in DB
        run: |
          psql "$DATABASE_URL" <<'SQL'
          SELECT s.name, COUNT(p.id) AS prices, MAX(p.collected_at) AS last_seen
          FROM public.stores s
          LEFT JOIN public.prices p ON p.store_id = s.id
          WHERE s.id IN (551, 552, 553, 554, 555, 556, 557, 558)
          GROUP BY s.name
          ORDER BY s.name;
          SQL
