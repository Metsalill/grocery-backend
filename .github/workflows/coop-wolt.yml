name: Coop Wolt Crawl + Ingest
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"   # daily at 04:00 UTC (was every 6h - too frequent)
jobs:
  crawl-wolt:
    runs-on: ubuntu-latest
    timeout-minutes: 70   # bumped from 45 — crawl takes ~40min, ingest needs headroom
    strategy:
      fail-fast: false
      matrix:
        include:
          - store_id: "551"
            city: "parnu"
            store_host: "coop-prnu"
          - store_id: "552"
            city: "tallinn"
            store_host: "coop-laagri"
          - store_id: "553"
            city: "tallinn"
            store_host: "konsum-juri"
          - store_id: "554"
            city: "tallinn"
            store_host: "coop-miiduranna"
          - store_id: "555"
            city: "tartu"
            store_host: "coop-akadeemia"
          - store_id: "556"
            city: "tallinn"
            store_host: "coop-lasname"
          - store_id: "557"
            city: "tallinn"
            store_host: "coop-mustakivi"
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_PUBLIC }}   # was RW_DATABASE_URL
      PGSSLMODE: require
      PYTHONUNBUFFERED: "1"
      STORE_ID: ${{ matrix.store_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests selectolax tenacity psycopg
      - name: Crawl & ingest this Wolt store
        run: |
          python3 scripts/wolt_crawler.py \
            --store-host "${{ matrix.store_host }}" \
            --city "${{ matrix.city }}" \
            --categories-file "data/wolt_categories_slugs.txt" \
            --ingest-mode main
