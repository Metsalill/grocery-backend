name: Coop Wolt Crawl + Ingest
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"   # daily at 04:00 UTC

jobs:

  crawl:
    name: crawl (${{ matrix.store_host }})
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - store_id: "551"
            city: "parnu"
            store_host: "coop-prnu"
          - store_id: "552"
            city: "tallinn"
            store_host: "coop-laagri"
          - store_id: "553"
            city: "tallinn"
            store_host: "konsum-juri"
          - store_id: "554"
            city: "tallinn"
            store_host: "coop-miiduranna"
          - store_id: "555"
            city: "tallinn"
            store_host: "coop-akadeemia"
          - store_id: "556"
            city: "tallinn"
            store_host: "coop-lasname"
          - store_id: "557"
            city: "tallinn"
            store_host: "coop-mustakivi"
          - store_id: "558"
            city: "tallinn"
            store_host: "konsum-saku"
    env:
      PYTHONUNBUFFERED: "1"
      STORE_ID: ${{ matrix.store_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests selectolax tenacity

      - name: Crawl Wolt store (CSV only, no DB)
        run: |
          python3 scripts/wolt_crawler.py \
            --store-host "${{ matrix.store_host }}" \
            --city "${{ matrix.city }}" \
            --categories-file "data/wolt_categories_slugs.txt" \
            --skip-ingest

      - name: Show CSV output
        run: |
          ls -lah out/ || true
          for f in out/coop_wolt_*.csv; do
            echo "--- $f ---"
            wc -l "$f" || true
            head -n 3 "$f" || true
          done

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: wolt-csv-${{ matrix.store_host }}-${{ github.run_id }}
          path: out/coop_wolt_*.csv
          if-no-files-found: warn
          retention-days: 3

  ingest:
    name: ingest (all stores)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: crawl
    if: always()
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_PUBLIC }}
      PGSSLMODE: require
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install "psycopg[binary]"

      - name: Download all crawl artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wolt-csv-*-${{ github.run_id }}
          path: out/
          merge-multiple: true

      - name: Show downloaded CSVs
        run: |
          echo "Downloaded files:"
          ls -lah out/ || echo "(none)"

      - name: Ingest all CSVs into DB
        run: |
          python3 - <<'PYEOF'
          import os, csv, glob, psycopg, datetime, time

          db_url = os.environ["DATABASE_URL"]

          STORE_MAP = {
              "coop-prnu":       551,
              "coop-laagri":     552,
              "konsum-juri":     553,
              "coop-miiduranna": 554,
              "coop-akadeemia":  555,
              "coop-lasname":    556,
              "coop-mustakivi":  557,
              "konsum-saku":     558,
          }

          BATCH_SIZE = 500

          SQL = """
          WITH
            cleaned_ean AS (
              SELECT NULLIF(regexp_replace(%s::text, '[^0-9]', '', 'g'), '') AS ean
            ),
            existing_by_ext AS (
              SELECT product_id
              FROM ext_product_map
              WHERE source = 'coop' AND ext_id = %s::text
              LIMIT 1
            ),
            existing_by_ean AS (
              SELECT p.id AS product_id
              FROM products p, cleaned_ean c
              WHERE c.ean IS NOT NULL
                AND regexp_replace(COALESCE(p.ean,''), '[^0-9]', '', 'g') = c.ean
              LIMIT 1
            ),
            resolved AS (
              SELECT COALESCE(
                (SELECT product_id FROM existing_by_ext),
                (SELECT product_id FROM existing_by_ean)
              ) AS product_id
            ),
            inserted AS (
              INSERT INTO products (name, brand, size_text, ean, source_url, last_seen_utc, food_group, chain)
              SELECT
                %s::text, ''::text, %s::text,
                (SELECT ean FROM cleaned_ean),
                NULL, %s::timestamptz, NULL, 'coop'::text
              WHERE (SELECT product_id FROM resolved) IS NULL
              RETURNING id AS product_id
            ),
            final_id AS (
              SELECT COALESCE(
                (SELECT product_id FROM resolved),
                (SELECT product_id FROM inserted)
              ) AS product_id
            ),
            upsert_ext AS (
              INSERT INTO ext_product_map
                (source, ext_id, product_id, reason, confidence, last_seen, source_url, ean, updated_at)
              SELECT
                'coop', %s::text,
                (SELECT product_id FROM final_id),
                CASE WHEN (SELECT ean FROM cleaned_ean) IS NOT NULL THEN 'ean' ELSE 'created/no-ean' END,
                CASE WHEN (SELECT ean FROM cleaned_ean) IS NOT NULL THEN 1.0 ELSE 0.5 END,
                %s::timestamptz, NULL,
                (SELECT ean FROM cleaned_ean),
                %s::timestamptz
              ON CONFLICT (source, ext_id) DO UPDATE SET
                product_id = EXCLUDED.product_id,
                reason     = EXCLUDED.reason,
                confidence = EXCLUDED.confidence,
                last_seen  = EXCLUDED.last_seen,
                ean        = EXCLUDED.ean,
                updated_at = EXCLUDED.updated_at
            )
          INSERT INTO prices (product_id, store_id, price, seen_at, collected_at, currency, source, source_url)
          SELECT
            (SELECT product_id FROM final_id),
            %s::integer, %s::numeric, %s::timestamptz, %s::timestamptz,
            'EUR', 'coop', NULL
          ON CONFLICT (product_id, store_id) DO UPDATE SET
            price        = EXCLUDED.price,
            seen_at      = EXCLUDED.seen_at,
            collected_at = EXCLUDED.collected_at,
            currency     = EXCLUDED.currency,
            source       = EXCLUDED.source;
          """

          csvs = sorted(glob.glob("out/coop_wolt_*.csv"))
          if not csvs:
              print("[warn] No CSVs found -- nothing to ingest.")
              raise SystemExit(0)

          print(f"[ingest] Found {len(csvs)} CSV files: {csvs}")

          total_sent = 0
          total_errors = 0
          ts_now = datetime.datetime.now(datetime.timezone.utc)

          with psycopg.connect(db_url) as conn:
              try:
                  for csv_path in csvs:
                      print(f"[ingest] processing {csv_path}")
                      t0 = time.time()
                      with open(csv_path, newline="", encoding="utf-8") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)

                      if not rows:
                          print(f"  -> empty, skipping")
                          continue

                      sample_host = (rows[0].get("store_host") or "").replace("wolt:", "").strip()
                      store_id = STORE_MAP.get(sample_host)
                      if not store_id:
                          print(f"  -> [warn] unknown store_host={sample_host!r}, skipping")
                          continue

                      params = []
                      for r in rows:
                          price_raw = r.get("price") or ""
                          try:
                              price_val = float(price_raw)
                          except (ValueError, TypeError):
                              continue
                          if price_val <= 0:
                              continue

                          ext_id = f"wolt:{r.get('item_id') or ''}" if r.get("item_id") else ""
                          if not ext_id or ext_id == "wolt:":
                              continue

                          params.append((
                              r.get("barcode_gtin") or "",  # cleaned_ean
                              ext_id,                        # existing_by_ext lookup
                              r.get("name") or "",           # inserted.name
                              r.get("unit_info") or "",      # inserted.size_text
                              ts_now,                        # inserted.last_seen_utc
                              ext_id,                        # upsert_ext.ext_id
                              ts_now,                        # upsert_ext.last_seen
                              ts_now,                        # upsert_ext.updated_at
                              store_id,                      # prices.store_id
                              price_val,                     # prices.price
                              ts_now,                        # prices.seen_at
                              ts_now,                        # prices.collected_at
                          ))

                      sent = 0
                      errors = 0
                      for i in range(0, len(params), BATCH_SIZE):
                          batch = params[i:i + BATCH_SIZE]
                          batch_num = i // BATCH_SIZE + 1
                          for attempt in range(3):
                              try:
                                  with conn.pipeline():
                                      with conn.cursor() as cur:
                                          cur.executemany(SQL, batch)
                                  conn.commit()
                                  sent += len(batch)
                                  print(f"  [batch {batch_num}] {len(batch)} rows (total: {sent})")
                                  break
                              except Exception as e:
                                  print(f"  [warn] batch {batch_num} attempt {attempt+1} failed: {e}")
                                  conn.rollback()
                                  time.sleep(2 ** attempt)
                                  if attempt == 2:
                                      errors += len(batch)

                      elapsed = time.time() - t0
                      print(f"  -> {sample_host} (store_id={store_id}): {sent} upserted, {errors} errors [{elapsed:.1f}s]")
                      total_sent += sent
                      total_errors += errors

              finally:
                  pass

          print(f"\n[done] Total: {total_sent} rows upserted, {total_errors} errors")
          PYEOF

      - name: Verify prices in DB
        run: |
          psql "$DATABASE_URL" -c "
          SELECT s.id, s.name, COUNT(p.id) AS prices, MAX(p.collected_at) AS last_seen
          FROM public.stores s
          LEFT JOIN public.prices p ON p.store_id = s.id
          WHERE s.id IN (551,552,553,554,555,556,557,558)
          GROUP BY s.id, s.name
          ORDER BY s.id;"
