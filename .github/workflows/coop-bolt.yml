name: Coop - Bolt

on:
  schedule:
    - cron: "30 7 * * *"   # 07:30 UTC = 09:30 Estonian (stores open 09:00)
  workflow_dispatch:

jobs:
  coop-bolt:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "tartu, kvartali-coop-maksimarket, 1969, 559"
            venue_id: "1969"
            store_id: "559"
            out_file: "data/bolt/2-tartu/kvartali-coop-maksimarket.csv"
            delivery_lat: "58.377983"
            delivery_lng: "26.729038"

          - name: "tartu, lounakeskuse-coop-maksimarket, 2281, 561"
            venue_id: "2281"
            store_id: "561"
            out_file: "data/bolt/2-tartu/lounakeskuse-coop-maksimarket.csv"
            delivery_lat: "58.377983"
            delivery_lng: "26.729038"

          - name: "tartu, eedeni-coop-maksimarket, 1970, 560"
            venue_id: "1970"
            store_id: "560"
            out_file: "data/bolt/2-tartu/eedeni-coop-maksimarket.csv"
            delivery_lat: "58.356789"
            delivery_lng: "26.693456"

    name: coop-bolt (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests asyncpg urllib3 brotli

      - name: Run Bolt crawler + ingest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STORE_ID: ${{ matrix.store_id }}
        run: |
          python scripts/bolt_crawler.py \
            --venue-id "${{ matrix.venue_id }}" \
            --delivery-lat "${{ matrix.delivery_lat }}" \
            --delivery-lng "${{ matrix.delivery_lng }}" \
            --out "${{ matrix.out_file }}" \
            --req-delay 0.5 \
            --upsert-db 1
