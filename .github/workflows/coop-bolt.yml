name: Coop Bolt scrape + DB ingest

on:
  workflow_dispatch:
  schedule:
    - cron: "12 3 * * *"   # daily at 03:12 UTC

jobs:
  scrape-bolt:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - city: tartu
            store: kvartali-coop-maksimarket
            store_id: "559"
            categories_file: data/bolt/2-tartu/kvartali-coop-maksimarket.txt
            out: out/bolt_kvartali.csv
          - city: tartu
            store: lounakeskuse-coop-maksimarket
            store_id: "561"
            categories_file: data/bolt/2-tartu/lounakeskuse-coop-maksimarket.txt
            out: out/bolt_lounakeskus.csv
          - city: tartu
            store: eedeni-coop-maksimarket
            store_id: "560"
            categories_file: data/bolt/2-tartu/eedeni-coop-maksimarket.txt
            out: out/bolt_eedeni.csv

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_PUBLIC }}
      PGSSLMODE: require
      PYTHONUNBUFFERED: "1"
      STORE_ID: ${{ matrix.store_id }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install crawler deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install playwright selectolax beautifulsoup4 httpx tenacity pydantic asyncpg psycopg
          python -m playwright install --with-deps chromium

      - name: Patch bolt_crawler.py to use STORE_ID env directly
        run: |
          python - <<'PYEOF'
          import re, pathlib, os
          path = pathlib.Path("scripts/bolt_crawler.py")
          src = path.read_text(encoding="utf-8")

          old = "async def _ingest_to_db(products: List[Product]) -> None:"
          new = (
              "async def _ingest_to_db(products: List[Product]) -> None:\n"
              "    import os as _os\n"
              "    _env_store_id = int(_os.environ.get('STORE_ID', '0') or '0')\n"
          )
          src = src.replace(old, new, 1)

          old2 = "store_id = store_map.get(p.venue_id)"
          new2 = "store_id = _env_store_id if _env_store_id > 0 else store_map.get(p.venue_id)"
          src = src.replace(old2, new2, 1)

          path.write_text(src, encoding="utf-8")
          print("Patched bolt_crawler.py to use STORE_ID env")
          PYEOF

      - name: Run Bolt crawler + ingest
        run: |
          set -euo pipefail
          mkdir -p out
          python3 scripts/bolt_crawler.py \
            --categories-file "${{ matrix.categories_file }}" \
            --city "${{ matrix.city }}" \
            --store "${{ matrix.store }}" \
            --upsert-db main \
            --out "${{ matrix.out }}" \
            --headless 1 \
            --req-delay 1

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bolt-${{ matrix.store }}
          path: ${{ matrix.out }}
          if-no-files-found: warn
          retention-days: 7
