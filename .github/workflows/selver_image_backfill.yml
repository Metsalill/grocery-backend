name: Selver Image Backfill

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max products to process"
        required: false
        default: "10000"
      check_url:
        description: "Verify image exists on CDN before updating (slower)"
        required: false
        default: "false"

concurrency:
  group: selver-image-backfill
  cancel-in-progress: true

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_PUBLIC }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install psycopg2-binary requests

      - name: Run Selver image backfill
        run: |
          ARGS="--limit ${{ github.event.inputs.limit || '10000' }}"
          if [ "${{ github.event.inputs.check_url }}" = "true" ]; then
            ARGS="$ARGS --check-url"
          fi
          python scripts/selver_image_backfill.py $ARGS
