name: Fix Canonical Encoding

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_PUBLIC }}
      PGSSLMODE: require
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install psycopg2-binary
      - run: python scripts/fix_canonical_encoding.py
