name: "Rimi - Daily Price Scraper (requests)"

on:
  workflow_dispatch:
    inputs:
      max_products:
        description: "Hard cap on total products (0 = unlimited)"
        required: false
        default: "0"
      req_delay:
        description: "Delay between HTTP requests (sec)"
        required: false
        default: "0.3"
  schedule:
    - cron: "0 9 * * *"  

concurrency:
  group: rimi-prices
  cancel-in-progress: true

jobs:
  scrape-prices:
    name: scrape-prices (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
      max-parallel: 8

    env:
      PYTHONUNBUFFERED: "1"
      OUTPUT_CSV: data/rimi_products.csv
      SHARD: ${{ matrix.shard }}
      DATABASE_URL: ${{ secrets.DATABASE_URL_PUBLIC }}
      PGSSLMODE: require
      STORE_ID: "440"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-requests-${{ hashFiles('requirements-scraper.txt', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml asyncpg

      - name: Prepare workspace
        shell: bash
        run: |
          set -euo pipefail
          rm -rf data
          mkdir -p data

      - name: Prepare category list (shard slice)
        shell: bash
        env:
          SHARDS: 8
        run: |
          set -euo pipefail
          if [ -f data/rimi_categories.txt ]; then
            cp -f data/rimi_categories.txt data/rimi_categories_all.txt
          else
            printf '%s\n' \
              "https://www.rimi.ee/epood/ee/tooted/puuviljad-koogiviljad-lilled/c/SH-12" \
              "https://www.rimi.ee/epood/ee/tooted/talu-toidab/c/SH-19" \
              "https://www.rimi.ee/epood/ee/tooted/piimatooted-munad-juust/c/SH-11" \
              "https://www.rimi.ee/epood/ee/tooted/liha--ja-kalatooted/c/SH-8" \
              "https://www.rimi.ee/epood/ee/tooted/vegantooted/c/SH-17" \
              "https://www.rimi.ee/epood/ee/tooted/leivad-saiad-kondiitritooted/c/SH-6" \
              "https://www.rimi.ee/epood/ee/tooted/valmistoit/c/SH-16" \
              "https://www.rimi.ee/epood/ee/tooted/kauasailivad-toidukaubad/c/SH-13" \
              "https://www.rimi.ee/epood/ee/tooted/maiustused-ja-snakid/c/SH-9" \
              "https://www.rimi.ee/epood/ee/tooted/kulmutatud-toidukaubad/c/SH-4" \
              "https://www.rimi.ee/epood/ee/tooted/joogid/c/SH-3" \
              "https://www.rimi.ee/epood/ee/tooted/puhastusvahendid/c/SH-14" \
              "https://www.rimi.ee/epood/ee/tooted/lastekaubad/c/SH-5" \
              "https://www.rimi.ee/epood/ee/tooted/alkohol/c/SH-1" \
              > data/rimi_categories_all.txt
          fi

          awk -v s="$SHARD" -v n="$SHARDS" 'NR>0 { if ((NR-1)%n==s) print }' \
            data/rimi_categories_all.txt > data/rimi_categories.txt

          echo "Shard $SHARD categories:"
          cat data/rimi_categories.txt

      - name: Scrape prices
        shell: bash
        env:
          MAX_PRODUCTS: ${{ github.event.inputs.max_products || '0' }}
          REQ_DELAY: ${{ github.event.inputs.req_delay || '0.3' }}
        run: |
          set -euo pipefail
          echo "Start (UTC): $(date -u)"

          python -u scripts/rimi_requests_scraper.py \
            --cats-file data/rimi_categories.txt \
            --output-csv "$OUTPUT_CSV" \
            --req-delay "$REQ_DELAY" \
            --max-products "$MAX_PRODUCTS"

          echo "End (UTC): $(date -u)"

      - name: Show CSV stats
        if: always()
        run: |
          echo "---- line count ----"
          wc -l "$OUTPUT_CSV" || echo "(no CSV)"
          echo "---- first 5 lines ----"
          head -n 5 "$OUTPUT_CSV" || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rimi-prices-shard-${{ matrix.shard }}-${{ github.run_id }}
          path: |
            data/rimi_products.csv
          if-no-files-found: warn
          retention-days: 3
