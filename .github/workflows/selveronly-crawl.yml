name: "Selver Category Crawl v2"

on:
  workflow_dispatch: {}
  schedule:
    - cron: "19 3 * * *"

concurrency:
  group: selver-category-crawl
  cancel-in-progress: true

jobs:
  scrape:
    name: scrape (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_PUBLIC }}
      PGSSLMODE: require
      STORE_ID: "31"
      PYTHONUNBUFFERED: "1"
      SHARD: ${{ matrix.shard }}
      SHARDS: "8"
      REQ_DELAY: "0.4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml psycopg2-binary

      - name: DB sanity check
        run: |
          python -c "
          import os, psycopg2
          c = psycopg2.connect(os.environ['DATABASE_URL'])
          cur = c.cursor()
          cur.execute('SELECT current_database(), current_user;')
          print('DB identity:', cur.fetchone())
          c.close()
          "

      - name: Scrape Selver categories (requests + BS4)
        run: |
          set -euo pipefail
          python scripts/selver_crawl_categories_pw.py \
            --store-id "$STORE_ID" \
            --delay "$REQ_DELAY" \
            --shard "$SHARD" \
            --shards "$SHARDS"

      - name: Report prices count
        if: always()
        run: |
          python -c "
          import os, psycopg2
          c = psycopg2.connect(os.environ['DATABASE_URL'])
          cur = c.cursor()
          cur.execute('''
            SELECT COUNT(*) FROM prices p
            JOIN stores s ON s.id = p.store_id
            WHERE s.id = 31
          ''')
          print('Selver online prices:', cur.fetchone()[0])
          c.close()
          "
