name: Coop eCoop scrape + upsert

on:
  schedule:
    - cron: "17 3 * * *"   # daily at 03:17 UTC
  workflow_dispatch:

jobs:
  scrape:
    name: scrape (haapsalu eCoop, shard ${{ matrix.cat_index }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        cat_index: [0, 1, 2, 3, 4, 5, 6, 7]

    concurrency:
      group: coop-ecoop-haapsalu-${{ matrix.cat_index }}
      cancel-in-progress: false

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_PUBLIC }}
      PGSSLMODE: require
      PYTHONUNBUFFERED: "1"
      STORE_ID: "445"   # Haapsalu eCoop

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install crawler deps (pip + Playwright)
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run eCoop crawler (haapsalu | shard ${{ matrix.cat_index }})
        id: crawl
        timeout-minutes: 40
        run: |
          mkdir -p out
          OUT="out/ecoop_haapsalu_${{ matrix.cat_index }}.csv"
          python3 scripts/ecoop_crawler.py \
            --store-url https://coophaapsalu.ee \
            --store-host coophaapsalu.ee \
            --store-id 445 \
            --categories-file data/coop_haapsalu_categories.txt \
            --cat-shards 8 \
            --cat-index  ${{ matrix.cat_index }} \
            --page-limit 9999 \
            --max-products 1000000 \
            --req-delay 0.2 \
            --pdp-workers 2 \
            --goto-strategy networkidle \
            --headless 1 \
            --out "$OUT" \
            --upsert-db main \
            || echo "[warn] crawler returned non-zero; uploading whatever was written"

      - name: Upload CSV artifact (per shard)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecoop_haapsalu_${{ matrix.cat_index }}
          path: out/ecoop_haapsalu_${{ matrix.cat_index }}.csv
          if-no-files-found: ignore
          retention-days: 7
