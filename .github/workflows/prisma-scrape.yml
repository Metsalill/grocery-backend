name: "Prisma DB Scrape + CSV Artifact"

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: prisma-db-scrape
  cancel-in-progress: true

jobs:
  scrape:
    name: scrape (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_PUBLIC }}
      PGSSLMODE: require
      STORE_ID: "14"
      PYTHONUNBUFFERED: "1"
      SHARD: ${{ matrix.shard }}
      SHARDS: "6"
      REQ_DELAY: "0.5"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          set -euo pipefail
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml psycopg2-binary

      - name: DB sanity check
        run: |
          pip install psycopg2-binary
          python -c "
          import os, psycopg2
          c = psycopg2.connect(os.environ['DATABASE_URL'])
          cur = c.cursor()
          cur.execute('SELECT current_database(), current_user;')
          print('DB identity:', cur.fetchone())
          c.close()
          "

      - name: Scrape Prisma categories (requests + BS4)
        run: |
          set -euo pipefail
          python scripts/prisma_scraper_v2.py \
            --store-id "$STORE_ID" \
            --delay "$REQ_DELAY" \
            --shard "$SHARD" \
            --shards "$SHARDS"

      - name: Report prices count
        if: always()
        run: |
          pip install psycopg2-binary
          python -c "
          import os, psycopg2
          c = psycopg2.connect(os.environ['DATABASE_URL'])
          cur = c.cursor()
          cur.execute('''
            SELECT COUNT(*) FROM prices p
            JOIN stores s ON s.id = p.store_id
            WHERE s.chain = 'Prisma' AND s.is_online = TRUE
          ''')
          print('Prisma online prices:', cur.fetchone()[0])
          c.close()
          "
