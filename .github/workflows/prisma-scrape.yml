name: prisma

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC daily
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30      # was 200 — new scraper needs ~3 min
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_PUBLIC }}
      PGSSLMODE: require
      PYTHONUNBUFFERED: "1"
      STORE_ID: "14"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests asyncpg urllib3

      - name: Run Prisma scraper
        run: python scripts/prisma_scraper.py
